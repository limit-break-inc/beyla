name: Check third-party licenses

on:
  push:
    branches: [ 'main', 'release-*' ]
  pull_request:
    branches: [ 'main', 'release-*' ]

# Set restrictive permissions at workflow level
permissions:
  contents: read

jobs:
  check-licenses:
    name: check-licenses
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [ '1.24' ]
    steps:
      - uses: actions/checkout@v6.0.2 # v3
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6.4.0 # v3
        with:
          cache: 'false'
          go-version: ${{ matrix.go }}
      - name: Check licenses
        run: make check-licenses

name: PR OATS test

on:
  push:
    branches: [ 'main', 'release-*' ]
  pull_request:
    branches: [ 'main', 'release-*' ]


jobs:
  test:
    name: test
    runs-on: ubuntu-latest-8-cores
    strategy:
      matrix:
        go: [ '1.24' ]
    # Set restrictive permissions at workflow level
    permissions:
      contents: read
      # required for CODECOV token
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2 # v3
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6.4.0 # v3
        with:
          cache: false  # Disable caching to avoid extraction conflicts
          go-version: ${{ matrix.go }}
      - name: Clean up disk space
        run: |
          docker system prune -af
          docker volume prune -f
      - name: Run oats tests
        run: make oats-test
      - name: Upload oats test logs
        uses: actions/upload-artifact@v7.0.0 # v4
        if: always()
        with:
          name: Oats test logs
          path: test/oats/*/build/*
      - id: get-codecov-token
        uses: grafana/shared-workflows/actions/get-vault-secrets@get-vault-secrets/v1.2.1
        continue-on-error: true
        with:
          # Secrets placed in the ci/repo/grafana/beyla/codecov path in Vault
          repo_secrets: |
            CODECOV_TOKEN=codecov:token
      - name: Report coverage
        uses: codecov/codecov-action@v6.0.0 # v4
        continue-on-error: true
        with:
          file: ./testoutput/itest-covdata.txt
          flags: oats-test

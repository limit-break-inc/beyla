name: publish-technical-documentation-next

on:
  push:
    branches:
      - main
    paths:
      - "docs/sources/**"
  workflow_dispatch:

# Set restrictive permissions at workflow level
permissions:
  contents: read

jobs:
  sync:
    if: github.repository == 'grafana/beyla'
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2 # v4
        with:
          persist-credentials: false
      - uses: grafana/writers-toolkit/publish-technical-documentation@vale/v1.0.0 # publish-technical-documentation/v1
        with:
          website_directory: content/docs/beyla/next
